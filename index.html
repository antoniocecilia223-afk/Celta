<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELTA OS | OMNIVERSO SUPREME</title>
    <style>
        :root { --primary: #ff0000; --bg: #000; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; 
            overflow: hidden; width: 100vw; height: 100vh; display: flex; flex-direction: column;
        }

        /* TRADUTOR */
        #translate-wrapper { background: #050505; padding: 5px; text-align: right; border-bottom: 1px solid var(--primary); height: 40px; }

        /* NAV SUPREMA */
        nav { 
            background: rgba(0,0,0,0.95); display: flex; justify-content: center; gap: 5px; 
            border-bottom: 2px solid var(--primary); height: 50px; align-items: center; z-index: 1000;
        }
        nav a { color: #777; text-decoration: none; font-weight: bold; font-size: 10px; text-transform: uppercase; padding: 12px 15px; cursor: pointer; }
        nav a:hover, nav a.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* VIEWPORT (ECRÃ TOTAL) */
        #viewport { flex-grow: 1; width: 100%; position: relative; }
        .page { display: none; width: 100%; height: 100%; position: absolute; }
        .active-page { display: block; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* LOGIN 2FA */
        #login-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.99); z-index: 10000; display: flex;
            align-items: center; justify-content: center; backdrop-filter: blur(20px);
        }
        .login-box {
            background: #050505; padding: 40px; border-radius: 20px; border: 2px solid var(--primary);
            width: 90%; max-width: 380px; text-align: center; box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);
        }
        .login-box input {
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px;
            border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 18px;
        }
        .btn-auth { width: 100%; padding: 15px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; }

        /* HOME VISUAL */
        .bh-core {
            width: 160px; height: 160px; background: #000; border-radius: 50%;
            box-shadow: 0 0 40px #fff, 0 0 80px var(--primary), inset 0 0 40px #000;
            animation: pulse 2s infinite alternate; margin: 15vh auto 20px;
        }
        @keyframes pulse { from { transform: scale(0.95); } to { transform: scale(1.05); } }
    </style>
</head>
<body onload="verificarSessao()">

    <div id="translate-wrapper"><div id="google_translate_element"></div></div>

    <div id="login-modal">
        <div class="login-box" id="step-1">
            <h2 style="color:var(--primary); letter-spacing:3px;">CELTA ACCESS</h2>
            <input type="email" id="u-email" placeholder="Email do Arquiteto">
            <input type="password" id="u-pass" placeholder="Password">
            <button class="btn-auth" onclick="gerarToken()">PEDIR CÓDIGO</button>
        </div>
        <div class="login-box" id="step-2" style="display:none;">
            <h2 style="color:var(--primary);">CÓDIGO DE 6 DÍGITOS</h2>
            <input type="text" id="u-token" placeholder="000000" maxlength="6">
            <button class="btn-auth" onclick="validarToken()">ENTRAR NO MULTIVERSO</button>
        </div>
    </div>

    <nav>
        <a onclick="openPage('home')" id="nav-home" class="active">🏠 Home</a>
        <a onclick="openPage('omni')" id="nav-omni" style="color:var(--primary)">🔮 Omniverso</a>
        <a onclick="openPage('ia')" id="nav-ia">🤖 Celta IA</a>
        <a onclick="openPage('clima')" id="nav-clima">☁️ Clima</a>
        <a onclick="openPage('music')" id="nav-music">🎵 Música</a>
        <a onclick="openPage('cinema')" id="nav-cinema">🎬 Cinema</a>
        <a onclick="location.reload()" style="color:var(--primary)">🔒 Sair</a>
    </nav>

    <div id="viewport">
        <div id="home" class="page active-page">
            <div style="text-align:center;">
                <div class="bh-core"></div>
                <h1 style="font-size:90px; color:var(--primary); text-shadow: 0 0 30px var(--primary); font-style:italic;">CELTA</h1>
                <p id="user-tag" style="letter-spacing:10px; color:#333; font-size:10px;">SISTEMA PROTEGIDO</p>
            </div>
        </div>

        <div id="omni" class="page">
            <iframe src="https://worldwidetelescope.org/webclient/"></iframe>
        </div>

        <div id="ia" class="page"><iframe src="https://www.blackbox.ai/"></iframe></div>
        <div id="clima" class="page"><iframe src="https://www.windy.com/"></iframe></div>
        <div id="music" class="page"><iframe src="https://www.deezer.com/pt/channels/explore"></iframe></div>
        <div id="cinema" class="page"><iframe src="https://netcineq.lat/"></iframe></div>
    </div>

    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'pt'}, 'google_translate_element'); }

        let tokenAtual = "";

        function gerarToken() {
            if(!document.getElementById('u-email').value.includes("@")) return alert("Email Inválido");
            tokenAtual = Math.floor(100000 + Math.random() * 900000).toString();
            alert("CÓDIGO CELTA ENVIADO: " + tokenAtual);
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }

        function validarToken() {
            if(document.getElementById('u-token').value === tokenAtual) {
                localStorage.setItem('celtaSession', document.getElementById('u-email').value);
                location.reload();
            } else { alert("CÓDIGO INVÁLIDO"); }
        }

        function verificarSessao() {
            const sessao = localStorage.getItem('celtaSession');
            if(sessao) {
                document.getElementById('login-modal').style.display = 'none';
                document.getElementById('user-tag').innerText = "ARQUITETO: " + sessao.toUpperCase();
                document.getElementById('user-tag').style.color = "var(--primary)";
            }
        }

        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('nav-'+id).classList.add('active');
        }
    </script>
</body>
</html>
