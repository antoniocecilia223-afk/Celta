<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELTA OS | SUPREME 2026</title>
    <style>
        :root { 
            --primary: #00ff00; --bg: #050505; --card-bg: #111; 
            --accent: #ff00ff; --netcine-red: #e50914; 
            --euro-blue: #003399; --deezer-purple: #a238ff; 
            --weather-blue: #00d4ff;
        }
        * { box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background: var(--bg); color: #fff; 
            overflow-x: hidden; min-height: 100vh;
        }

        /* STATUS DE SESSÃO NO NÚCLEO */
        .logged-in .black-hole {
            box-shadow: 0 0 60px var(--primary), inset 0 0 20px var(--primary);
            border: 2px solid var(--primary);
        }

        /* LOADER BURACO NEGRO */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .black-hole {
            width: 130px; height: 130px; background: #000; border-radius: 50%;
            box-shadow: 0 0 40px #fff, 0 0 80px var(--primary), inset 0 0 40px #000;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(0.9); } to { transform: scale(1.1); opacity: 0.8; } }

        /* NAVEGAÇÃO */
        nav { 
            background: rgba(0,0,0,0.95); padding: 15px; display: flex; 
            justify-content: center; gap: 8px; border-bottom: 1px solid #222; 
            position: sticky; top: 0; z-index: 1000; flex-wrap: wrap;
            backdrop-filter: blur(15px);
        }
        nav a { 
            color: #888; text-decoration: none; font-weight: bold; font-size: 10px; 
            text-transform: uppercase; padding: 10px 15px; border-radius: 8px; cursor: pointer;
        }
        nav a:hover, nav a.active { color: var(--primary); border: 1px solid var(--primary); background: rgba(0,255,0,0.05); }

        /* PÁGINAS */
        .page { display: none; padding: 25px; animation: fadeIn 0.6s ease; min-height: calc(100vh - 80px); }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        iframe { width: 100%; height: 600px; border: none; border-radius: 15px; background: #000; margin-bottom: 20px; }

        /* BUSCA HOME */
        .home-wrap { text-align: center; margin-top: 10vh; }
        .search-box { 
            width: 85%; max-width: 500px; padding: 18px; border-radius: 50px; 
            border: 2px solid var(--primary); background: transparent; color: #fff; text-align: center; font-size: 18px;
        }
        
        #user-status { font-size: 12px; color: var(--primary); margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body id="main-body" onload="checkAutoLogin()">

    <div id="loader">
        <div class="black-hole"></div>
        <h2 style="margin-top:30px; letter-spacing:8px;">CELTA CORE</h2>
    </div>

    <nav>
        <a onclick="triggerLoading('home')" id="nav-home" class="active">🔍 Busca</a>
        <a onclick="triggerLoading('ia')" id="nav-ia">🤖 Celta IA</a>
        <a onclick="triggerLoading('clima')" id="nav-clima">☁️ Clima</a>
        <a onclick="triggerLoading('music')" id="nav-music">🎵 Música</a>
        <a onclick="triggerLoading('cinema')" id="nav-cinema">🎬 Filmes</a>
        <a onclick="triggerLoading('news')" id="nav-news">🌎 Notícias</a>
        <a onclick="triggerLoading('jogos')" id="nav-jogos">🕹️ Jogos</a>
        <a onclick="triggerLoading('futebol')" id="nav-futebol">⚽ Futebol</a>
    </nav>

    <div id="home" class="page active-page">
        <div class="home-wrap">
            <div class="black-hole" style="width:110px; height:110px; margin: 0 auto 30px;"></div>
            <h1 style="font-size:70px; font-style:italic; margin:0; letter-spacing:-3px;">CELTA</h1>
            <div id="user-status">SISTEMA OFFLINE</div>
            <form action="https://www.google.com/search" method="GET" style="margin-top:20px;">
                <input type="text" name="q" class="search-box" placeholder="Pesquisar no Multiverso...">
            </form>
        </div>
    </div>

    <div id="ia" class="page">
        <p style="text-align:center; color:var(--primary); font-size:12px;">Inicie sessão na Blackbox para ativar a CELTA OS</p>
        <iframe id="ia-frame" src="https://www.blackbox.ai/" onmouseover="syncLogin()"></iframe>
    </div>

    <div id="clima" class="page">
        <iframe src="https://www.windy.com/multimodel/-15.191/12.153?temp,-15.654,12.153,7"></iframe>
        <iframe src="https://www.tempo.com/noticias/actualidade/fenomeno-astronomico-em-20-de-marco-equinocio-marca-nova-fase-do-ano.html" style="height: 700px;"></iframe>
    </div>

    <div id="music" class="page">
        <div style="background: rgba(162, 56, 255, 0.1); border: 1px solid var(--deezer-purple); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px;">
            <h2 style="color:var(--deezer-purple); margin:0;">🎵 DEEZER SYNC</h2>
            <a href="https://www.deezer.com/pt/" target="_blank" style="color:white; text-decoration:none; font-weight:bold;">ABRIR PLAYER</a>
        </div>
        <iframe src="https://www.deezer.com/pt/"></iframe>
    </div>

    <div id="cinema" class="page"><iframe src="https://netcineq.lat/"></iframe></div>
    <div id="news" class="page"><iframe src="https://pt.euronews.com/noticias/internacional"></iframe></div>
    <div id="jogos" class="page">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <iframe src="https://www.miniplay.com/embed/pac-man"></iframe>
            <iframe src="https://m.plonga.com/online-games/snake"></iframe>
        </div>
    </div>
    <div id="futebol" class="page"><iframe src="https://www.scorebat.com/embed/livescore/"></iframe></div>

    <script>
        let isLoggedIn = false;

        function syncLogin() {
            if(!isLoggedIn) {
                isLoggedIn = true;
                document.getElementById('main-body').classList.add('logged-in');
                document.getElementById('user-status').innerHTML = "SESSÃO ATIVA | CELTA IA CONNECTED";
                document.getElementById('user-status').style.color = "#00ff00";
                localStorage.setItem('celtaSession', 'active');
            }
        }

        function checkAutoLogin() {
            if(localStorage.getItem('celtaSession') === 'active') {
                syncLogin();
            }
        }

        function triggerLoading(pageId) {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            setTimeout(() => {
                loader.style.display = 'none';
                openPage(pageId);
            }, 1000);
        }

        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('nav-' + id).classList.add('active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
