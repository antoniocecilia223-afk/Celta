<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELTA OS | SUPREME 2026</title>
    <style>
        :root { --primary: #00ff00; --bg: #050505; --card-bg: #111; }
        * { box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #fff; overflow-x: hidden; }

        /* LOADER BURACO NEGRO */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .black-hole {
            width: 120px; height: 120px; background: #000; border-radius: 50%;
            box-shadow: 0 0 40px #fff, 0 0 80px var(--primary), inset 0 0 40px #000;
            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(0.9); } to { transform: scale(1.1); } }

        /* MENU */
        nav { 
            background: rgba(0,0,0,0.9); padding: 15px; display: flex; 
            justify-content: center; gap: 10px; border-bottom: 1px solid #222; 
            position: sticky; top: 0; z-index: 1000; flex-wrap: wrap;
        }
        nav a { 
            color: #888; text-decoration: none; font-weight: bold; font-size: 11px; 
            text-transform: uppercase; padding: 10px 15px; border-radius: 5px; cursor: pointer;
        }
        nav a:hover, nav a.active { color: var(--primary); border: 1px solid var(--primary); background: rgba(0,255,0,0.05); }

        /* PAGINAS */
        .page { display: none; padding: 20px; animation: fadeIn 0.5s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        iframe { width: 100%; border: none; border-radius: 15px; background: #000; min-height: 600px; }

        /* ESTILO YT MUSIC */
        .music-shelf { display: flex; overflow-x: auto; gap: 20px; padding: 10px 0; scrollbar-width: thin; }
        .music-card { min-width: 250px; background: var(--card-bg); padding: 15px; border-radius: 15px; border-bottom: 3px solid var(--primary); }
        .music-card iframe { min-height: 150px !important; }

        .search-bar { 
            width: 80%; max-width: 500px; padding: 15px; border-radius: 50px; 
            border: 2px solid var(--primary); background: transparent; color: #fff; text-align: center; font-size: 18px;
        }
    </style>
</head>
<body onload="initSystem()">

    <div id="loader">
        <div class="black-hole"></div>
        <h2 style="margin-top:20px; letter-spacing:5px;">CELTA PROCESSING...</h2>
    </div>

    <nav>
        <a onclick="triggerLoading('home')" id="nav-home" class="active">🔍 Busca</a>
        <a onclick="triggerLoading('ia')" id="nav-ia">🤖 Celta IA</a>
        <a onclick="triggerLoading('news')" id="nav-news">🌎 Notícias</a>
        <a onclick="triggerLoading('music')" id="nav-music">🎵 Música</a>
        <a onclick="triggerLoading('jogos')" id="nav-jogos">🕹️ Jogos</a>
        <a onclick="triggerLoading('futebol')" id="nav-futebol">⚽ Futebol</a>
        <a onclick="triggerLoading('cinema')" id="nav-cinema">🎬 Cinema</a>
    </nav>

    <div id="home" class="page active-page">
        <div style="text-align:center; margin-top:15vh;">
            <div class="black-hole" style="width:100px; height:100px; margin: 0 auto 30px;"></div>
            <h1 style="font-size:80px; font-style:italic; margin:0;">CELTA</h1>
            <form action="https://www.google.com/search" method="GET">
                <input type="text" name="q" class="search-bar" placeholder="Explorar o Multiverso...">
            </form>
        </div>
    </div>

    <div id="ia" class="page">
        <h2 style="text-align:center; color:var(--primary);">🤖 CELTA INTELLIGENCE</h2>
        <iframe src="https://duckduckgo.com/?q=DuckDuckGo+AI+Chat&ia=chat"></iframe>
    </div>

    <div id="news" class="page">
        <h2 style="text-align:center;">🌎 ÚLTIMAS NOTÍCIAS (PT/AO)</h2>
        <iframe src="https://www.sapo.pt/noticias"></iframe>
    </div>

    <div id="music" class="page">
        <h2 style="color:var(--primary);">🔥 Recomendados para Si</h2>
        <div class="music-shelf">
            <div class="music-card"><b>Sina da Ofélia</b><iframe src="https://www.youtube.com/embed/R4_pWm4tT3U"></iframe></div>
            <div class="music-card"><b>Taka Montagem</b><iframe src="https://www.youtube.com/embed/G5lNWND0oqQ"></iframe></div>
            <div class="music-card"><b>Linkin Park</b><iframe src="https://www.youtube.com/embed/Wa2MqAhAK5s"></iframe></div>
            <div class="music-card"><b>Afro House 2026</b><iframe src="https://www.youtube.com/embed/videoseries?list=PL_XQ6XfG-pX2_XWn-9kY0N"></iframe></div>
        </div>

        <h2 style="color:#ff00ff; margin-top:40px;">🙏 Espiritual & Gospel</h2>
        <div class="music-shelf">
            <div class="music-card"><b>Gospel Mix</b><iframe src="https://www.youtube.com/embed/videoseries?list=PL_XQ6XfG-pX1vT-9Z7eB6G_vXWn-9kY0N"></iframe></div>
            <div class="music-card"><b>Adoração</b><iframe src="https://www.youtube.com/embed/videoseries?list=PL_XQ6XfG-pX0-G_vXWn-9kY0N"></iframe></div>
        </div>
    </div>

    <div id="jogos" class="page">
        <h2 style="text-align:center;">🕹️ CELTA ARCADE</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <iframe src="https://www.miniplay.com/embed/pac-man" style="min-height:400px;"></iframe>
            <iframe src="https://m.plonga.com/online-games/snake" style="min-height:400px;"></iframe>
        </div>
    </div>

    <div id="futebol" class="page">
        <iframe src="https://www.scorebat.com/embed/livescore/"></iframe>
    </div>

    <div id="cinema" class="page">
        <iframe src="https://archive.org/details/movies?embed=1"></iframe>
    </div>

    <footer style="text-align:center; padding:30px;">
        <button style="background:transparent; border:none; color:#111; cursor:pointer;" onclick="accessSecret()">.</button>
    </footer>

    <script>
        function triggerLoading(pageId) {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            setTimeout(() => {
                loader.style.display = 'none';
                openPage(pageId);
            }, 1000);
        }

        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('nav-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function accessSecret() {
            if(prompt("ADMIN PASS:") === "1234") { 
                alert("ACESSO AO NÚCLEO SDC LIBERADO!");
                triggerLoading('home');
            }
        }
    </script>
</body>
</html>
