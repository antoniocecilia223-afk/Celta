<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELTA OS | SUPREME 2026</title>
    <style>
        :root {
            --primary: #00ff00;
            --bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.95);
            --border: rgba(0, 255, 0, 0.2);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background-color: var(--bg); color: #fff; 
            min-height: 100vh; overflow: hidden; 
        }

        /* LOADER BURACO NEGRO */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .black-hole {
            width: 120px; height: 120px; background: #000; border-radius: 50%;
            box-shadow: 0 0 30px 10px #fff, 0 0 60px 20px var(--primary), inset 0 0 30px #000;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(0.9); } to { transform: scale(1.1); } }

        /* NAVEGAÇÃO */
        nav { 
            background: rgba(0, 0, 0, 0.9); padding: 12px; 
            display: flex; justify-content: center; gap: 8px; 
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
            flex-wrap: wrap; backdrop-filter: blur(10px);
        }

        nav a { 
            color: #888; text-decoration: none; font-weight: bold; cursor: pointer; 
            font-size: 10px; text-transform: uppercase; padding: 10px 14px; 
            border-radius: 6px; border: 1px solid transparent;
        }

        nav a:hover, nav a.active { 
            color: var(--primary); border: 1px solid var(--primary); 
            background: rgba(0, 255, 0, 0.05);
        }

        /* CONTEÚDO */
        .page { display: none; height: calc(100vh - 70px); width: 100vw; animation: fadeIn 0.5s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* HOME */
        .home-content { text-align: center; padding-top: 15vh; }
        .search-bar { 
            width: 80%; max-width: 500px; padding: 18px; border-radius: 40px; 
            border: 2px solid var(--primary); background: transparent; color: #fff; font-size: 18px; text-align: center;
        }

        /* ESTILO PARA QUANDO SITES BLOQUEIAM */
        .error-handler {
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;
            text-align: center; padding: 20px;
        }
        .btn-portal {
            background: var(--primary); color: #000; padding: 15px 30px; border-radius: 30px;
            text-decoration: none; font-weight: bold; margin-top: 20px; box-shadow: 0 0 20px var(--primary);
        }
    </style>
</head>
<body onload="initSystem()">

    <div id="loader">
        <div class="black-hole"></div>
        <h2 style="margin-top:20px; letter-spacing:5px;">CELTA PROCESSING...</h2>
    </div>

    <nav>
        <a onclick="triggerLoading('home')" id="nav-home" class="active">🔍 Busca</a>
        <a onclick="triggerLoading('ia-page')" id="nav-ia-page">🤖 Celta IA</a>
        <a onclick="triggerLoading('news-page')" id="nav-news-page">🌎 Notícias</a>
        <a onclick="triggerLoading('music-page')" id="nav-music-page">🎵 Música</a>
        <a onclick="triggerLoading('football-page')" id="nav-football-page">⚽ Futebol</a>
        <a onclick="triggerLoading('cinema-page')" id="nav-cinema-page">🎬 Cinema</a>
        <a onclick="triggerLoading('admin-page')" id="nav-admin-page">📊 Admin</a>
    </nav>

    <div id="home" class="page active-page">
        <div class="home-content">
            <div class="black-hole" style="width:100px; height:100px; margin: 0 auto 30px;"></div>
            <h1 style="font-size:60px; font-style:italic; margin:0;">CELTA</h1>
            <form action="https://www.google.com/search" method="GET">
                <input type="text" name="q" class="search-bar" placeholder="Pesquisar na rede...">
            </form>
        </div>
    </div>

    <div id="ia-page" class="page">
        <iframe src="https://huggingface.co/chat/"></iframe>
    </div>

    <div id="news-page" class="page">
        <iframe src="https://www.euronews.com/embed/timeline"></iframe>
    </div>

    <div id="music-page" class="page" style="overflow-y: auto; padding: 20px;">
        <h2 style="text-align:center;">🎵 BIBLIOTECA CELTA</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            <div style="background:#111; padding:15px; border-radius:15px; border-left: 5px solid var(--primary);">
                <h3>🔥 Afrohouse & Montagem</h3>
                <iframe src="https://www.youtube.com/embed/G5lNWND0oqQ" style="height:200px;"></iframe>
            </div>
            <div style="background:#111; padding:15px; border-radius:15px; border-left: 5px solid #ff00ff;">
                <h3>🙏 Religiosa</h3>
                <iframe src="https://www.youtube.com/embed/videoseries?list=PL_XQ6XfG-pX1vT-9Z7eB6G_vXWn-9kY0N" style="height:200px;"></iframe>
            </div>
        </div>
    </div>

    <div id="football-page" class="page">
        <iframe src="https://www.scorebat.com/embed/livescore/"></iframe>
    </div>

    <div id="cinema-page" class="page">
        <iframe src="https://archive.org/details/movies?embed=1"></iframe>
    </div>

    <div id="admin-page" class="page">
        <div class="error-handler">
            <div class="black-hole" style="width:80px; height:80px;"></div>
            <h2>ADMIN DASHBOARD</h2>
            <p>User: antoniocecilia223@gmail.com</p>
            <p>Status: Celta Core Online</p>
        </div>
    </div>

    <footer style="text-align:center; position:fixed; bottom:10px; width:100%;">
        <button style="background:transparent; border:none; color:#111; cursor:pointer;" onclick="accessSecret()">.</button>
    </footer>

    <script>
        function triggerLoading(pageId) {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            setTimeout(() => {
                loader.style.display = 'none';
                openPage(pageId);
            }, 1000);
        }

        function openPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('nav-' + id).classList.add('active');
        }

        function accessSecret() {
            if(prompt("ADMIN PASS:") === "1234") { triggerLoading('admin-page'); }
        }
    </script>
</body>
</html>
