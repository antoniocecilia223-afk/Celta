<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELTA OS | ARCHITECT SUPREME v5.1</title>
    <style>
        :root { --primary: #ff0000; --bg: #000; --panel: #050505; }
        * { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* HEADER FIXO */
        header { 
            background: var(--panel); padding: 12px 25px; border-bottom: 1px solid var(--primary); 
            display: flex; align-items: center; gap: 20px; z-index: 1001;
        }
        .search-engine { flex-grow: 1; display: flex; background: #0c0c0c; border: 1px solid #222; border-radius: 4px; padding: 8px 15px; }
        .search-engine input { background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 14px; }
        .search-engine button { background: none; border: none; color: var(--primary); cursor: pointer; font-weight: bold; }

        /* NAVEGAÇÃO */
        nav { background: rgba(0,0,0,0.98); display: flex; justify-content: center; border-bottom: 1px solid #111; height: 45px; align-items: center; z-index: 1001; }
        nav a { color: #444; text-decoration: none; font-weight: bold; font-size: 10px; text-transform: uppercase; padding: 0 15px; cursor: pointer; letter-spacing: 1px; }
        nav a:hover, nav a.active { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* VIEWPORT */
        #viewport { flex-grow: 1; position: relative; width: 100%; overflow: hidden; padding-bottom: 60px; }
        .page { display: none; width: 100%; height: 100%; position: absolute; }
        .active-page { display: block; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }

        /* BURACO NEGRO INTEGRADO */
        .black-hole-container { 
            height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            background: radial-gradient(circle, #0a0000 0%, #000 75%);
        }
        .black-hole {
            width: 180px; height: 180px; background: #000; border-radius: 50%;
            box-shadow: 0 0 50px 15px #ff0000, inset 0 0 40px #300;
            position: relative; animation: absorb 3s infinite ease-in-out;
        }
        @keyframes absorb {
            0%, 100% { transform: scale(1); box-shadow: 0 0 50px 15px #ff0000; }
            50% { transform: scale(1.08); box-shadow: 0 0 90px 30px #ff0000; }
        }

        /* CONTADOR MUNDIAL (FIXO) */
        .celta-footer { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            background: rgba(5, 5, 5, 0.95); border-top: 1px solid var(--primary);
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px;
            z-index: 2000; backdrop-filter: blur(5px);
        }
        #wc-timer { 
            color: var(--primary); font-weight: bold; font-size: 24px; 
            text-shadow: 0 0 20px var(--primary); font-family: 'Courier New', monospace; 
        }
        .footer-tag { font-size: 9px; color: #555; font-weight: bold; letter-spacing: 2px; }

        /* REDE MONITOR */
        .net-card { background: #080808; border: 1px solid #1a1a1a; padding: 20px; border-radius: 8px; max-width: 500px; margin: 40px auto; }
        .btn-boost { background: var(--primary); color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; border-radius: 4px; }
    </style>
</head>
<body onload="boot()">

    <header>
        <div style="color:var(--primary); font-weight: bold; letter-spacing: 2px; font-size: 20px;">CELTA</div>
        <div class="search-engine">
            <input type="text" id="omni-in" placeholder="Pesquisar no Omniverso..." onkeydown="if(event.key==='Enter') search()">
            <button onclick="search()">BUSCAR</button>
        </div>
        <div id="google_translate_element"></div>
    </header>

    <nav>
        <a onclick="tab('home')" id="m-home" class="active">Dashboard</a>
        <a onclick="tab('net')" id="m-net" style="color:var(--primary)">Rede</a>
        <a onclick="tab('browser')" id="m-browser">Navegador</a>
        <a onclick="tab('futebol')" id="m-futebol">Futebol</a>
        <a onclick="tab('news')" id="m-news">Notícias</a>
        <a onclick="tab('clima')" id="m-clima">Clima</a>
    </nav>

    <div id="viewport">
        <div id="home" class="page active-page">
            <div class="black-hole-container">
                <div class="black-hole"></div>
                <h1 style="font-size: 60px; font-style: italic; color: var(--primary); margin-top: 25px; letter-spacing: 12px;">CELTA</h1>
                <p style="color: #222; font-weight: bold; font-size: 10px; letter-spacing: 4px;">SISTEMA OPERATIVO ANGOLANO</p>
            </div>
        </div>

        <div id="net" class="page">
            <div class="net-card">
                <h3 style="color:var(--primary); font-style:italic; margin-bottom:15px;">NET MONITOR</h3>
                <div style="display:flex; justify-content: space-between; text-align:center;">
                    <div><p style="color:#444; font-size:10px;">PING</p><p id="p-val" style="font-size:20px;">-- ms</p></div>
                    <div><p style="color:#444; font-size:10px;">REDE</p><p id="n-type" style="font-size:20px;">SCAN</p></div>
                </div>
                <button class="btn-boost" onclick="location.reload()">EXECUTAR BOOST</button>
            </div>
        </div>

        <div id="browser" class="page"><iframe id="f-omni" src="https://www.google.com/search?igu=1"></iframe></div>
        
        <div id="futebol" class="page"><iframe src="https://pt.besoccer.com/"></iframe></div>
        
        <div id="news" class="page"><iframe src="https://g1.globo.com/"></iframe></div>

        <div id="clima" class="page"><iframe src="https://embed.windy.com/embed2.html?lat=-15.191&lon=12.153&zoom=5"></iframe></div>
    </div>

    <div class="celta-footer">
        <div class="footer-tag">MOÇÂMEDES | SCD</div>
        <div id="wc-timer">000d 00h 00m 00s</div>
        <div style="color:var(--primary); font-weight:bold;">v5.1</div>
    </div>

    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script>
        function googleTranslateElementInit() { new google.translate.TranslateElement({pageLanguage: 'pt'}, 'google_translate_element'); }

        function boot() {
            startTimer();
            netLoop();
            setInterval(netLoop, 4000);
        }

        function search() {
            let val = document.getElementById('omni-in').value;
            if(val) {
                document.getElementById('f-omni').src = "https://www.google.com/search?q=" + encodeURIComponent(val) + "&igu=1";
                tab('browser');
            }
        }

        function netLoop() {
            const start = Date.now();
            fetch('https://www.google.com/favicon.ico', { mode: 'no-cors', cache: 'no-store' }).then(() => {
                document.getElementById('p-val').innerText = (Date.now() - start) + " ms";
            });
            if (navigator.connection) {
                document.getElementById('n-type').innerText = navigator.connection.effectiveType.toUpperCase();
            }
        }

        function startTimer() {
            const target = new Date("June 11, 2026 00:00:00").getTime();
            setInterval(() => {
                const diff = target - new Date().getTime();
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('wc-timer').innerText = `${d}d ${h}h ${m}m ${s}s`;
            }, 1000);
        }

        function tab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active-page');
            document.getElementById('m-'+id).classList.add('active');
        }
    </script>
</body>
</html>
